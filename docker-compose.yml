services:
  postgres:
    image: postgres:16-alpine
    container_name: learnmap-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: learnmap
      POSTGRES_PASSWORD: learnmap
      POSTGRES_DB: learnmap
    volumes:
      - learnmap_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U learnmap -d learnmap']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  learnmap_pgdata:
