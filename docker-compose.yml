services:
  postgres:
    image: postgres:16-alpine
    container_name: roadmap-build-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: roadmap-build
      POSTGRES_PASSWORD: roadmap-build
      POSTGRES_DB: roadmap-build
    volumes:
      - roadmap-build_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U roadmap-build -d roadmap-build']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: roadmap-build-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      APP_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://roadmap-build:roadmap-build@postgres:5432/roadmap-build
      SEED_DATABASE: ${SEED_DATABASE:-false}
    volumes:
      - ./api:/workspace
      - /workspace/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: roadmap-build-app
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    volumes:
      - ./app:/workspace
      - /workspace/node_modules
    depends_on:
      - api

volumes:
  roadmap-build_pgdata:
